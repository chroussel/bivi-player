<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEVC Player Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111; color: #eee;
            font-family: system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 2rem;
        }
        h1 { margin-bottom: 1rem; font-size: 1.4rem; font-weight: 400; }
        hevc-player { max-width: 90vw; max-height: 80vh; width: 1280px; }
        .demos { margin-bottom: 1rem; display: flex; gap: 0.5rem; }
        button {
            background: #333; color: #eee; border: 1px solid #555;
            padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer;
        }
        button:hover { background: #444; }
        .file-input {
            border: 2px dashed #444; border-radius: 12px; padding: 2rem 3rem;
            text-align: center; cursor: pointer; color: #999; margin-bottom: 1rem;
            transition: border-color 0.2s; display: block;
        }
        .file-input:hover, .file-input.drag-over { border-color: #6cf; }
    </style>
</head>
<body>
    <h1>HEVC Video Player</h1>

    <label class="file-input" for="file-picker">
        Drop an HEVC .mp4/.mkv file here or click to browse
        <input type="file" id="file-picker" accept=".mp4,.m4v,.mov,.mkv,.webm" style="display:none">
    </label>

    <div class="demos">
        <button onclick="document.querySelector('hevc-player').loadUrl('data/hellmode12_2m.mp4')">Load MP4</button>
        <button onclick="document.querySelector('hevc-player').loadUrl('data/hellmode12_2m.mkv')">Load MKV</button>
        <button onclick="document.querySelector('hevc-player').streamUrl('data/hellmode12_2m.mp4')">Stream MP4</button>
    </div>

    <hevc-player></hevc-player>

    <script type="module" src="lib/hevc-player.js"></script>
    <script>
        const player = document.querySelector('hevc-player');
        const filePicker = document.getElementById('file-picker');

        filePicker.addEventListener('change', e => {
            if (e.target.files[0]) player.loadFile(e.target.files[0]);
        });

        document.addEventListener('dragover', e => e.preventDefault());
        document.addEventListener('drop', e => {
            e.preventDefault();
            const file = e.dataTransfer?.files[0];
            if (file) player.loadFile(file);
        });
    </script>
</body>
</html>
